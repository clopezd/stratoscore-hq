<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    .config {
      margin-bottom: 12px;
    }
    .config label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 4px;
    }
    .config input {
      width: 100%;
      padding: 8px 10px;
      font-size: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      outline: none;
    }
    .config input:focus { border-color: #8b5cf6; }
    .btn {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-secondary {
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
      margin-top: 8px;
      font-size: 11px;
    }
    .btn-secondary:hover { color: #e0e0e0; border-color: #555; }
    .result {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
    }
    .result.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; }
    .result.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
    .result.info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #3b82f6; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .stat {
      text-align: center;
      padding: 8px;
      background: #1a1a1a;
      border-radius: 6px;
    }
    .stat .value { font-size: 18px; font-weight: 700; }
    .stat .label { font-size: 9px; text-transform: uppercase; color: #666; margin-top: 2px; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warning {
      font-size: 10px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }
    .not-bc {
      text-align: center;
      padding: 20px 0;
    }
    .not-bc p { font-size: 12px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1>BidHunter</h1>
  </div>

  <div id="notBc" class="not-bc" style="display:none;">
    <p>Open <strong>BuildingConnected Bid Board</strong> first, then click scrape.</p>
    <a href="https://app.buildingconnected.com/bid-board" target="_blank" class="btn btn-secondary" style="margin-top:12px;">Open Bid Board →</a>
  </div>

  <div id="main" style="display:none;">
    <div class="status" id="pageStatus">Detecting page...</div>

    <div class="config">
      <label>BidHunter Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:3000" />
    </div>

    <div class="config">
      <label>Extension Key</label>
      <input type="password" id="extensionKey" placeholder="BIDHUNTER_EXTENSION_KEY" />
    </div>

    <button class="btn btn-primary" id="scrapeBtn">
      🎯 Scrape & Import
    </button>

    <div id="result"></div>
    <div id="stats" class="stats" style="display:none;"></div>
    <p class="warning">Credentials never leave your browser</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
