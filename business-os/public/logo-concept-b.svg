<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Concepto B: "Stratosphere Shield" — escudo/diamante con capas ascendentes -->
  <rect width="200" height="200" rx="40" fill="#001117"/>

  <!-- Diamond/shield shape -->
  <path d="M100,35 L155,100 L100,165 L45,100 Z" stroke="#00F2FE" stroke-width="2.5" fill="none" opacity="0.15"/>

  <!-- Inner ascending chevrons (stratosphere layers inside the diamond) -->
  <path d="M72,115 L100,90 L128,115" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  <path d="M72,100 L100,75 L128,100" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
  <path d="M72,85 L100,60 L128,85" stroke="#00F2FE" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>

  <!-- Peak glow -->
  <circle cx="100" cy="55" r="5" fill="#00F2FE" opacity="0.25"/>
  <circle cx="100" cy="55" r="2.5" fill="#00F2FE" opacity="0.9"/>
</svg>
