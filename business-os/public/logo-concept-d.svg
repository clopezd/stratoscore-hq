<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Concepto D: "Strato S" — S estilizada formada por capas atmosféricas -->
  <rect width="200" height="200" rx="40" fill="#001117"/>

  <!-- S shape made of 3 atmospheric arcs -->
  <!-- Top arc (curving right) -->
  <path d="M72,70 C72,48 92,38 112,38 C132,38 148,50 148,68 C148,82 138,90 122,94"
        stroke="url(#d-grad)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Middle connection -->
  <path d="M122,94 C102,100 78,108 78,108"
        stroke="#00F2FE" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Bottom arc (curving left) -->
  <path d="M78,108 C62,112 52,122 52,136 C52,154 68,166 88,166 C108,166 128,158 128,136"
        stroke="url(#d-grad2)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Atmospheric echo lines -->
  <path d="M72,70 C72,52 90,44 108,44" stroke="#00F2FE" stroke-width="1.5" opacity="0.2" stroke-linecap="round" fill="none"/>
  <path d="M92,166 C112,166 124,154 124,140" stroke="#00F2FE" stroke-width="1.5" opacity="0.2" stroke-linecap="round" fill="none"/>

  <!-- Glow at top of S -->
  <circle cx="112" cy="38" r="5" fill="#00F2FE" opacity="0.25"/>
  <circle cx="112" cy="38" r="2.5" fill="#00F2FE"/>

  <defs>
    <linearGradient id="d-grad" x1="72" y1="94" x2="148" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>
    <linearGradient id="d-grad2" x1="128" y1="108" x2="52" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
</svg>
