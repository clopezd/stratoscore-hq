<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Concepto C: "Summit" — pico abstracto con estela de lanzamiento -->
  <rect width="200" height="200" rx="40" fill="#001117"/>

  <!-- Launch trail (estela) -->
  <path d="M100,160 C100,160 85,120 100,45" stroke="url(#c-trail)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M100,160 C100,160 115,120 100,45" stroke="url(#c-trail)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Horizontal atmospheric layers crossed -->
  <line x1="55" y1="130" x2="145" y2="130" stroke="#00F2FE" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="60" y1="105" x2="140" y2="105" stroke="#00F2FE" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="68" y1="80" x2="132" y2="80" stroke="#00F2FE" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- Peak triangle -->
  <path d="M90,55 L100,35 L110,55" stroke="#00F2FE" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- Glow -->
  <circle cx="100" cy="35" r="8" fill="#00F2FE" opacity="0.15"/>
  <circle cx="100" cy="35" r="4" fill="#00F2FE" opacity="0.6"/>

  <defs>
    <linearGradient id="c-trail" x1="100" y1="160" x2="100" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#00F2FE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
</svg>
