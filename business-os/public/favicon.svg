<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#001117"/>
  <!-- Outer ring — stratosphere layer -->
  <circle cx="256" cy="256" r="180" stroke="url(#g1)" stroke-width="3" opacity="0.25"/>
  <!-- Mid ring -->
  <circle cx="256" cy="256" r="140" stroke="url(#g1)" stroke-width="2.5" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="100" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <!-- Core hexagon -->
  <polygon points="256,176 325,216 325,296 256,336 187,296 187,216" stroke="url(#g1)" stroke-width="4" fill="url(#g2)" opacity="0.9"/>
  <!-- S letterform inside core -->
  <path d="M232,232 C232,220 244,212 256,212 C268,212 280,220 280,232 C280,244 268,252 256,252 C244,252 232,260 232,272 C232,284 244,292 256,292 C268,292 280,284 280,272" stroke="#00F2FE" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Glow dot at center top -->
  <circle cx="256" cy="176" r="5" fill="#00F2FE" opacity="0.8"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,242,254,0.08)"/>
      <stop offset="100%" stop-color="rgba(8,145,178,0.03)"/>
    </linearGradient>
  </defs>
</svg>
