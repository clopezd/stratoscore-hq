name: Render Video con Voiceover

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/setup-video-project-cYEzQ

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: video-project
        run: npm ci

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate voiceover (ElevenLabs)
        working-directory: video-project
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: npx tsx generate-voiceover.ts

      - name: Render video
        working-directory: video-project
        run: npx remotion render src/index.ts LogisticaDemo out/logistica-demo.mp4

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: logistica-demo
          path: video-project/out/logistica-demo.mp4
          retention-days: 30

      - name: Commit video to branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f video-project/out/logistica-demo.mp4
          git commit -m "Auto-render: logistica demo with voiceover"
          git push origin HEAD:claude/setup-video-project-cYEzQ
