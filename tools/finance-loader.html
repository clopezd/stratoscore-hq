<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Loader — StratosCore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --input-bg: #12151e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--accent);
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      max-width: 1200px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    /* Form */
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 500;
    }
    input, select, textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 11px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    select option { background: var(--surface); }

    .tipo-buttons {
      display: flex;
      gap: 8px;
    }
    .tipo-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--input-bg);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .tipo-btn.active-ingreso { background: #14532d; border-color: var(--green); color: var(--green); }
    .tipo-btn.active-gasto   { background: #450a0a; border-color: var(--red);   color: var(--red);   }
    .tipo-btn.active-transf  { background: #1e1b4b; border-color: var(--accent); color: var(--accent); }
    .tipo-btn:hover { opacity: 0.85; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.danger { background: var(--red); }
    .btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* Alert */
    #alert {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 500;
    }
    #alert.ok  { background: #14532d; border: 1px solid var(--green); color: var(--green); }
    #alert.err { background: #450a0a; border: 1px solid var(--red);   color: var(--red);   }

    /* Tabla */
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .table-header h2 { margin-bottom: 0; }
    .summary-pills { display: flex; gap: 10px; }
    .pill {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 700;
    }
    .pill.income { background: #14532d; color: var(--green); }
    .pill.expense { background: #450a0a; color: var(--red); }
    .pill.balance { background: #1e1b4b; color: var(--accent-hover); }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 0 10px 10px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #1e2130;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .tipo-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tipo-ingreso { background: #14532d; color: var(--green); }
    .tipo-gasto   { background: #450a0a; color: var(--red);   }
    .tipo-transf  { background: #1e1b4b; color: var(--accent-hover); }

    .monto-ingreso { color: var(--green); font-weight: 700; }
    .monto-gasto   { color: var(--red);   font-weight: 700; }
    .monto-transf  { color: var(--accent-hover); font-weight: 700; }

    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .del-btn:hover { color: var(--red); }

    #loading { color: var(--muted); font-size: 13px; padding: 20px 0; text-align: center; }
    #empty   { color: var(--muted); font-size: 13px; padding: 20px 0; text-align: center; }

    /* CSV section */
    .csv-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .csv-section h3 { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
    textarea { resize: vertical; min-height: 80px; font-family: monospace; font-size: 12px; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 14px; }
    .filter-bar input, .filter-bar select { width: auto; flex: 1; }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>💰 Finance Loader</h1>
  <span class="badge">StratosCore</span>
</header>

<div class="layout">
  <!-- ── FORM ── -->
  <div>
    <div class="card">
      <h2>Nueva transacción</h2>

      <div id="alert"></div>

      <div class="field">
        <label>Tipo</label>
        <div class="tipo-buttons">
          <button class="tipo-btn active-ingreso" onclick="setTipo('ingreso')" id="btn-ingreso">↑ Ingreso</button>
          <button class="tipo-btn" onclick="setTipo('gasto')"   id="btn-gasto">↓ Gasto</button>
          <button class="tipo-btn" onclick="setTipo('transferencia')" id="btn-transf">⇄ Transfer.</button>
        </div>
        <input type="hidden" id="tipo" value="ingreso">
      </div>

      <div class="field">
        <label>Monto (MXN)</label>
        <input type="number" id="monto" placeholder="0.00" min="0" step="0.01">
      </div>

      <div class="row-2">
        <div class="field">
          <label>Categoría</label>
          <select id="categoria">
            <optgroup label="Ingresos">
              <option>Ventas Lavandería</option>
              <option>Comisión Seguros</option>
              <option>Ride Mobility</option>
              <option>Salario</option>
              <option>Freelance</option>
            </optgroup>
            <optgroup label="Gastos Operativos">
              <option>Insumos Lavandería</option>
              <option>Renta</option>
              <option>Servicios</option>
              <option>Nómina</option>
              <option>Publicidad</option>
            </optgroup>
            <optgroup label="Personal">
              <option>Comida</option>
              <option>Transporte</option>
              <option>Salud</option>
              <option>Entretenimiento</option>
              <option>Ahorro</option>
            </optgroup>
            <optgroup label="Tecnología">
              <option>SaaS / Suscripciones</option>
              <option>Hosting / Cloud</option>
              <option>Software</option>
            </optgroup>
            <option>Otros</option>
          </select>
        </div>
        <div class="field">
          <label>Cuenta</label>
          <select id="cuenta">
            <option>Lavandería</option>
            <option>Mobility</option>
            <option>Seguros</option>
            <option>Personal</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Descripción (opcional)</label>
        <input type="text" id="descripcion" placeholder="Ej: Pago quincena empleado...">
      </div>

      <div class="row-2">
        <div class="field">
          <label>Fecha y hora</label>
          <input type="datetime-local" id="fecha_hora">
        </div>
        <div class="field" id="cuenta-destino-wrap" style="display:none">
          <label>Cuenta destino</label>
          <select id="cuenta_destino">
            <option>Lavandería</option>
            <option>Mobility</option>
            <option>Seguros</option>
            <option>Personal</option>
          </select>
        </div>
      </div>

      <button class="btn" id="submit-btn" onclick="submitTx()">Registrar transacción</button>

      <!-- CSV bulk import -->
      <div class="csv-section">
        <h3>Importar CSV (bulk)</h3>
        <label style="margin-bottom:6px;display:block">Formato: tipo, monto, categoria, descripcion, fecha (YYYY-MM-DD), cuenta</label>
        <textarea id="csv-input" placeholder="ingreso,15000,Ventas Lavandería,Semana 1,2026-03-01,Lavandería&#10;gasto,2500,Insumos Lavandería,Detergente x10,2026-03-02,Lavandería&#10;ingreso,8000,Comisión Seguros,Póliza auto,2026-03-03,Seguros"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn secondary" onclick="previewCSV()">Vista previa</button>
          <button class="btn" id="csv-btn" onclick="importCSV()">Importar</button>
        </div>
        <div id="csv-preview" style="margin-top:10px;font-size:12px;color:var(--muted)"></div>
      </div>
    </div>
  </div>

  <!-- ── TABLA ── -->
  <div>
    <div class="card">
      <div class="table-header">
        <h2>Transacciones del mes</h2>
        <div class="summary-pills">
          <span class="pill income" id="pill-income">+ $0</span>
          <span class="pill expense" id="pill-expense">- $0</span>
          <span class="pill balance" id="pill-balance">= $0</span>
        </div>
      </div>

      <div class="filter-bar">
        <input type="text" id="filter-text" placeholder="Buscar..." oninput="renderTable()">
        <select id="filter-tipo" onchange="renderTable()">
          <option value="">Todos</option>
          <option value="ingreso">Ingresos</option>
          <option value="gasto">Gastos</option>
          <option value="transferencia">Transferencias</option>
        </select>
        <button class="btn secondary" style="width:auto;padding:8px 14px" onclick="loadTx()">↻</button>
      </div>

      <div id="loading">Cargando...</div>
      <div id="empty" style="display:none">Sin transacciones este mes.</div>

      <div style="overflow-x:auto">
        <table id="tx-table" style="display:none">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Descripción / Cat.</th>
              <th style="text-align:right">Monto</th>
              <th>Cuenta</th>
              <th>Fecha</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://csiiulvqzkgijxbgdqcv.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzaWl1bHZxemtnaWp4YmdkcWN2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ5MzI1MCwiZXhwIjoyMDg4MDY5MjUwfQ.1J3dw0LZCAZ9_Otey_rsRGiqgxVhjuVFM5MuZfXegLo'
  const HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let allTx = []
  let currentTipo = 'ingreso'

  // ── Init ───────────────────────────────────────────────────────────────────
  function init() {
    // Default fecha_hora = ahora
    const now = new Date()
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset())
    document.getElementById('fecha_hora').value = now.toISOString().slice(0, 16)
    loadTx()
  }

  // ── Tipo selector ──────────────────────────────────────────────────────────
  function setTipo(t) {
    currentTipo = t
    document.getElementById('tipo').value = t
    document.getElementById('btn-ingreso').className = 'tipo-btn' + (t === 'ingreso' ? ' active-ingreso' : '')
    document.getElementById('btn-gasto').className   = 'tipo-btn' + (t === 'gasto'   ? ' active-gasto'   : '')
    document.getElementById('btn-transf').className  = 'tipo-btn' + (t === 'transferencia' ? ' active-transf' : '')
    document.getElementById('cuenta-destino-wrap').style.display = t === 'transferencia' ? '' : 'none'
  }

  // ── Alert ──────────────────────────────────────────────────────────────────
  function showAlert(msg, isErr) {
    const el = document.getElementById('alert')
    el.textContent = msg
    el.className = isErr ? 'err' : 'ok'
    el.style.display = 'block'
    setTimeout(() => { el.style.display = 'none' }, 4000)
  }

  // ── Load transactions ──────────────────────────────────────────────────────
  async function loadTx() {
    document.getElementById('loading').style.display = 'block'
    document.getElementById('tx-table').style.display = 'none'
    document.getElementById('empty').style.display = 'none'

    const now = new Date()
    const y = now.getFullYear()
    const m = String(now.getMonth() + 1).padStart(2, '0')
    const monthStart = `${y}-${m}-01T00:00:00`

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/transacciones?select=*&fecha_hora=gte.${monthStart}&order=fecha_hora.desc`,
        { headers: HEADERS }
      )
      if (!res.ok) throw new Error(await res.text())
      allTx = await res.json()
      renderTable()
    } catch (e) {
      document.getElementById('loading').style.display = 'none'
      showAlert('Error cargando datos: ' + e.message, true)
    }
  }

  function fmtMXN(n) {
    return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n || 0)
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('es-MX', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
  }

  // ── Render table ───────────────────────────────────────────────────────────
  function renderTable() {
    const search = document.getElementById('filter-text').value.toLowerCase()
    const tipoF  = document.getElementById('filter-tipo').value

    let filtered = allTx.filter(t => {
      const matchTipo = !tipoF || t.tipo === tipoF
      const matchText = !search ||
        (t.descripcion || '').toLowerCase().includes(search) ||
        (t.categoria   || '').toLowerCase().includes(search) ||
        (t.cuenta      || '').toLowerCase().includes(search)
      return matchTipo && matchText
    })

    // Summary (from allTx, not filtered)
    const income   = allTx.filter(t => t.tipo === 'ingreso').reduce((s, t) => s + t.monto, 0)
    const expenses = allTx.filter(t => t.tipo === 'gasto').reduce((s, t) => s + t.monto, 0)
    document.getElementById('pill-income').textContent  = '+ ' + fmtMXN(income)
    document.getElementById('pill-expense').textContent = '- ' + fmtMXN(expenses)
    document.getElementById('pill-balance').textContent = '= ' + fmtMXN(income - expenses)

    document.getElementById('loading').style.display = 'none'

    if (filtered.length === 0) {
      document.getElementById('tx-table').style.display = 'none'
      document.getElementById('empty').style.display = 'block'
      return
    }

    document.getElementById('empty').style.display = 'none'
    document.getElementById('tx-table').style.display = 'table'

    const tbody = document.getElementById('tx-body')
    tbody.innerHTML = filtered.map(t => `
      <tr>
        <td><span class="tipo-badge tipo-${t.tipo}">${t.tipo}</span></td>
        <td>
          <div style="font-weight:500">${t.descripcion || '—'}</div>
          <div style="font-size:11px;color:var(--muted)">${t.categoria || ''}</div>
        </td>
        <td style="text-align:right" class="monto-${t.tipo}">${fmtMXN(t.monto)}</td>
        <td style="color:var(--muted)">${t.cuenta || '—'}</td>
        <td style="color:var(--muted);font-size:12px;white-space:nowrap">${fmtDate(t.fecha_hora)}</td>
        <td><button class="del-btn" onclick="deleteTx('${t.id}')" title="Eliminar">✕</button></td>
      </tr>
    `).join('')
  }

  // ── Submit transaction ─────────────────────────────────────────────────────
  async function submitTx() {
    const monto = parseFloat(document.getElementById('monto').value)
    if (!monto || monto <= 0) { showAlert('Ingresa un monto válido', true); return }

    const payload = {
      tipo: document.getElementById('tipo').value,
      monto,
      categoria: document.getElementById('categoria').value,
      descripcion: document.getElementById('descripcion').value || null,
      fecha_hora: document.getElementById('fecha_hora').value + ':00',
      cuenta: document.getElementById('cuenta').value,
      cuenta_destino: currentTipo === 'transferencia'
        ? document.getElementById('cuenta_destino').value : null,
    }

    const btn = document.getElementById('submit-btn')
    btn.disabled = true
    btn.textContent = 'Guardando...'

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/transacciones`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify(payload),
      })
      if (!res.ok) throw new Error(await res.text())
      const [created] = await res.json()
      allTx.unshift(created)
      renderTable()
      showAlert(`✓ Transacción registrada: ${fmtMXN(monto)} (${payload.tipo})`, false)
      document.getElementById('monto').value = ''
      document.getElementById('descripcion').value = ''
    } catch (e) {
      showAlert('Error: ' + e.message, true)
    } finally {
      btn.disabled = false
      btn.textContent = 'Registrar transacción'
    }
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  async function deleteTx(id) {
    if (!confirm('¿Eliminar esta transacción?')) return
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/transacciones?id=eq.${id}`, {
        method: 'DELETE',
        headers: HEADERS,
      })
      if (!res.ok) throw new Error(await res.text())
      allTx = allTx.filter(t => t.id !== id)
      renderTable()
    } catch (e) {
      showAlert('Error al eliminar: ' + e.message, true)
    }
  }

  // ── CSV Import ─────────────────────────────────────────────────────────────
  function parseCSVRows() {
    const raw = document.getElementById('csv-input').value.trim()
    if (!raw) return []

    return raw.split('\n').map((line, i) => {
      const cols = line.split(',').map(c => c.trim())
      if (cols.length < 5) return null
      const [tipo, monto, categoria, descripcion, fecha, cuenta] = cols
      const tipoClean = tipo.toLowerCase()
      if (!['ingreso', 'gasto', 'transferencia'].includes(tipoClean)) {
        console.warn(`Línea ${i+1}: tipo inválido "${tipo}"`)
        return null
      }
      const montoNum = parseFloat(monto)
      if (!montoNum || montoNum <= 0) {
        console.warn(`Línea ${i+1}: monto inválido "${monto}"`)
        return null
      }
      return {
        tipo: tipoClean,
        monto: montoNum,
        categoria: categoria || 'Otros',
        descripcion: descripcion || null,
        fecha_hora: (fecha || new Date().toISOString().slice(0, 10)) + 'T12:00:00',
        cuenta: cuenta || 'Personal',
      }
    }).filter(Boolean)
  }

  function previewCSV() {
    const rows = parseCSVRows()
    const el = document.getElementById('csv-preview')
    if (!rows.length) { el.textContent = 'Sin filas válidas.'; return }
    el.innerHTML = `<strong>${rows.length} filas listas para importar:</strong><br>` +
      rows.map(r => `• ${r.tipo} ${fmtMXN(r.monto)} — ${r.categoria} — ${r.cuenta} — ${r.fecha_hora.slice(0,10)}`).join('<br>')
  }

  async function importCSV() {
    const rows = parseCSVRows()
    if (!rows.length) { showAlert('Sin filas válidas en el CSV', true); return }

    const btn = document.getElementById('csv-btn')
    btn.disabled = true
    btn.textContent = `Importando ${rows.length}...`

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/transacciones`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify(rows),
      })
      if (!res.ok) throw new Error(await res.text())
      const created = await res.json()
      showAlert(`✓ ${created.length} transacciones importadas`, false)
      document.getElementById('csv-input').value = ''
      document.getElementById('csv-preview').textContent = ''
      await loadTx()
    } catch (e) {
      showAlert('Error importando CSV: ' + e.message, true)
    } finally {
      btn.disabled = false
      btn.textContent = 'Importar'
    }
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault()
      submitTx()
    }
  })

  init()
</script>
</body>
</html>
